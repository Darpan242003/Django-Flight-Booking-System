{% extends "main.html" %}

{% block content %}
<center>
    <form action="{% url "confirm_cancellation" booking.id %}" method="POST">
        {% csrf_token %}
        <h1>Are you sure you want to cancel this flight.</h1>
        <button class="btn btn-danger" type="submit">Yes, Cancel Booking</button>
        <a class="btn btn-primary" href="{% url "my_bookings" %}">No, Go back</a>
    </form>
</center>
{% endblock content %}
